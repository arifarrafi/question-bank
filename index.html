<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Solutions Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script>
  window.MathJax = {
    tex: {
      inlineMath:  [['$','$'],['\\(','\\)']],
      displayMath: [['$$','$$'],['\\[','\\]']],
    },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
  };
</script>
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════ */
:root {
  --navy:      #0d1b2a;
  --navy2:     #1a237e;
  --blue:      #1565c0;
  --blue-l:    #1976d2;
  --green:     #2e7d32;
  --green-l:   #43a047;
  --red:       #c62828;
  --red-l:     #e53935;
  --purple:    #6a1b9a;
  --purple-l:  #8e24aa;
  --teal:      #00695c;
  --teal-l:    #00897b;
  --orange:    #e65100;
  --orange-l:  #f57c00;
  --accent:    #f57f17;
  --bg:        #f0f4f8;
  --card:      #ffffff;
  --border:    #e0e7ef;
  --text:      #1a1a2e;
  --muted:     #546e7a;
  --code-bg:   #0d1117;
  --code-fg:   #c9d1d9;
  --shadow:    0 2px 10px rgba(0,0,0,0.09);
  --radius:    10px;
  --ff-body:   'Inter', sans-serif;
  --ff-mono:   'JetBrains Mono', monospace;
}

/* ═══════════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--ff-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.65;min-height:100vh;}
button{cursor:pointer;font-family:var(--ff-body);}
input,select{font-family:var(--ff-body);}
a{color:var(--blue);}

/* ═══════════════════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════════════════ */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:20px;
}
.login-card{
  background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.login-logo{font-size:36px;text-align:center;margin-bottom:8px;}
.login-title{text-align:center;font-size:20px;font-weight:700;color:var(--navy);}
.login-subtitle{text-align:center;color:var(--muted);font-size:12px;margin-bottom:28px;}
.login-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;margin-top:16px;}
.login-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;transition:border-color .2s,box-shadow .2s;outline:none;
}
.login-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.12);}
.login-btn{
  width:100%;margin-top:22px;padding:13px;background:linear-gradient(90deg,var(--blue),var(--blue-l));
  color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;
  transition:opacity .2s,transform .1s;letter-spacing:.3px;
}
.login-btn:hover{opacity:.92;}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.55;cursor:not-allowed;}
.login-err{
  margin-top:12px;padding:10px 12px;background:#fce4ec;border-left:4px solid var(--red);
  border-radius:6px;color:#b71c1c;font-size:12px;display:none;
}
.login-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
.login-divider{text-align:center;margin-top:20px;color:var(--muted);font-size:11px;}

/* ═══════════════════════════════════════════════════════════
   APP SCREEN
═══════════════════════════════════════════════════════════ */
#appScreen{display:none;}

/* ── Site Header ── */
.site-header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  color:#fff;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:200;
}
.site-header-title h1{font-size:17px;font-weight:700;line-height:1.2;}
.site-header-title p{color:#90caf9;font-size:11px;margin-top:2px;}
.site-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.user-chip{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#e3f2fd;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;
}
.role-badge{
  font-size:9px;background:var(--accent);color:#fff;
  padding:1px 5px;border-radius:3px;font-weight:700;vertical-align:middle;margin-left:4px;
}
.btn-logout{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;transition:background .2s;
}
.btn-logout:hover{background:rgba(255,255,255,.2);}

/* ── Filter Bar ── */
.filter-bar{
  background:#fff;border-bottom:1px solid var(--border);
  padding:10px 18px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;
  position:sticky;top:57px;z-index:190;box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.filter-bar select,.filter-bar input{
  padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;background:#fff;color:var(--text);outline:none;transition:border-color .2s;
}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--blue);}
.filter-bar select{min-width:118px;}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-wrap input{width:100%;padding-left:30px;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.btn-clear{
  padding:7px 14px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:6px;font-size:12px;color:var(--muted);transition:all .2s;white-space:nowrap;
}
.btn-clear:hover{background:#ffecb3;border-color:var(--accent);color:#5d4037;}
.stats-pill{
  background:#e3f2fd;color:var(--blue);padding:4px 10px;border-radius:12px;
  font-size:11px;font-weight:600;white-space:nowrap;margin-left:auto;
}

/* ── Category Quick-Chips ── */
.category-chips{
  background:#fff;border-bottom:1px solid var(--border);
  padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap;
  position:sticky;top:103px;z-index:180;
}
.cat-chip{
  background:var(--bg);border:1.5px solid var(--border);color:var(--muted);
  padding:5px 12px;border-radius:16px;font-size:11.5px;font-weight:600;
  transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;
}
.cat-chip:hover{border-color:var(--blue);color:var(--blue);}
.cat-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── Content Area ── */
.content-area{padding:16px 16px 40px;max-width:900px;margin:0 auto;}

/* ── Loading ── */
.loading-wrap{text-align:center;padding:60px 20px;color:var(--muted);}
.loading-wrap p{font-size:13px;margin-top:10px;}
.spinner{
  display:inline-block;width:36px;height:36px;
  border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Section Header ── */
.section-header{
  background:linear-gradient(90deg,var(--navy),#1a2f5e);
  color:#fff;padding:11px 16px;border-radius:var(--radius) var(--radius) 0 0;
  margin-top:22px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;gap:10px;
}
.section-header:first-child{margin-top:0;}
.section-info{flex:1;min-width:0;}
.section-uni{font-size:14px;font-weight:700;display:block;line-height:1.3;}
.section-meta{font-size:11px;color:#90caf9;display:block;margin-top:2px;}
.section-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.section-pill{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
  color:#e3f2fd;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;
}
.section-pill-accent{background:rgba(245,127,23,.35);border-color:var(--accent);color:#ffe082;}
.s-arrow{font-size:11px;color:#90caf9;flex-shrink:0;transition:transform .25s;}
.section-body{
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  margin-bottom:6px;overflow:hidden;
}
.section-body.collapsed{display:none;}

/* ── Question Card ── */
.card{background:var(--card);margin:0;border-bottom:1px solid var(--border);overflow:hidden;}
.card:last-child{border-bottom:none;}
.card-head{
  padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;user-select:none;gap:8px;
}
.card-head-blue  {background:linear-gradient(90deg,var(--blue),var(--blue-l));}
.card-head-green {background:linear-gradient(90deg,var(--green),var(--green-l));}
.card-head-red   {background:linear-gradient(90deg,var(--red),var(--red-l));}
.card-head-purple{background:linear-gradient(90deg,var(--purple),var(--purple-l));}
.card-head-teal  {background:linear-gradient(90deg,var(--teal),var(--teal-l));}
.card-head-orange{background:linear-gradient(90deg,var(--orange),var(--orange-l));}
.card-head-left{display:flex;align-items:center;flex:1;min-width:0;gap:8px;}
.qnum{
  background:rgba(255,255,255,.22);border-radius:4px;
  padding:1px 7px;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.card-title-wrap{min-width:0;flex:1;}
.card-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3;}
.card-cat{font-size:10px;color:rgba(255,255,255,.78);margin-top:1px;}
.c-arrow{font-size:10px;color:rgba(255,255,255,.7);flex-shrink:0;transition:transform .2s;}
.card-body{padding:14px;display:none;}
.card-body.open{display:block;}

/* ── Rich Content Styles (output of the smart formatter — used for BOTH question & answer) ── */
.rich-content h3{color:var(--blue);font-size:13px;font-weight:700;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.rich-content h3:first-child{margin-top:0;}
.rich-content p{margin:5px 0;font-size:13px;}
.rich-content ul,.rich-content ol{padding-left:20px;margin:6px 0;}
.rich-content li{margin:3px 0;font-size:13px;}
.rich-content strong{color:var(--navy);}

/* Code */
.rich-content pre{
  background:var(--code-bg);color:var(--code-fg);padding:13px 15px;
  border-radius:8px;overflow-x:auto;font-size:12px;margin:8px 0;
  font-family:var(--ff-mono);border:1px solid #30363d;line-height:1.65;
}
.rich-content code{
  background:#e8eaf6;color:#283593;padding:1px 6px;border-radius:4px;
  font-family:var(--ff-mono);font-size:11px;
}
.rich-content pre code{background:none;color:inherit;padding:0;font-size:12px;}

/* Tables */
.table-wrap{overflow-x:auto;margin:10px 0;border-radius:6px;}
.rich-content table{width:100%;border-collapse:collapse;font-size:12px;}
.rich-content th{background:var(--blue);color:#fff;padding:7px 10px;text-align:left;font-weight:600;}
.rich-content td{padding:7px 10px;border:1px solid var(--border);}
.rich-content tr:nth-child(even) td{background:#f5f9ff;}

/* Formula boxes */
.formula{
  background:#e8eaf6;border:1px solid #7986cb;border-radius:6px;
  padding:8px 14px;font-family:var(--ff-mono);font-size:13px;
  color:#1a237e;margin:6px 0;
}

/* Coloured boxes */
.box{padding:10px 13px;border-radius:6px;margin:8px 0;font-size:13px;line-height:1.6;}
.box-blue  {background:#e3f2fd;border-left:4px solid var(--blue);}
.box-green {background:#e8f5e9;border-left:4px solid var(--green-l);}
.box-orange{background:#fff3e0;border-left:4px solid var(--accent);}
.box-red   {background:#fce4ec;border-left:4px solid var(--red);}

/* Polished question highlight — wraps a .rich-content block */
.polished-q{
  background:#fffde7;border:1px solid #f9a825;border-radius:6px;
  padding:10px 13px;margin-bottom:12px;
}
.polished-q-label{
  font-size:10.5px;font-weight:700;color:#e65100;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;
}
.polished-q .rich-content{color:#4a3600;}
.polished-q .rich-content p{font-size:13px;}
.polished-q .rich-content h3{color:#e65100;border-bottom-color:#f9a825;}

/* Images */
.img-figure{text-align:center;margin:12px 0;}
.img-figure img.zoomable{
  max-width:100%;border-radius:8px;border:1px solid var(--border);
  cursor:zoom-in;transition:transform .2s,box-shadow .2s;
}
.img-figure img.zoomable:hover{transform:scale(1.01);box-shadow:0 6px 20px rgba(0,0,0,.15);}
.img-caption{font-size:11px;color:var(--muted);margin-top:5px;font-style:italic;}

/* Image failed-to-load fallback message */
.img-error{
  background:#fce4ec;border:1.5px dashed #c62828;border-radius:8px;
  padding:14px 16px;margin:10px 0;font-size:12px;color:#7a1f1f;
  text-align:center;line-height:1.7;
}
.img-error a{color:#c62828;font-weight:700;text-decoration:underline;}
.img-error .img-caption{color:#7a1f1f;opacity:.75;}

/* Generic resource link (non-image URL pasted on its own line) */
.resource-link{
  display:inline-flex;align-items:center;gap:5px;background:#e8eaf6;color:#283593;
  padding:7px 12px;border-radius:6px;font-size:12px;text-decoration:none;margin:6px 0;
  border:1px solid #c5cae9;word-break:break-all;
}
.resource-link:hover{background:#d1d9f5;}

/* ── No results ── */
.no-results{text-align:center;padding:60px 20px;color:var(--muted);}
.no-results p{font-size:14px;margin-top:8px;}

/* ── Lightbox ── */
#lightboxOverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:9000;align-items:center;justify-content:center;flex-direction:column;
  cursor:zoom-out;
}
#lightboxOverlay.active{display:flex;}
#lightboxImg{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;border:1px solid rgba(255,255,255,.1);}
#lightboxCaption{color:#ccc;font-size:12px;margin-top:10px;max-width:80vw;text-align:center;}
.lb-close{
  position:fixed;top:16px;right:20px;background:rgba(255,255,255,.15);
  border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:9001;
}
.lb-close:hover{background:rgba(255,255,255,.3);}

/* ── Toast ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;
  z-index:8000;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Responsive ── */
@media(max-width:600px){
  .site-header{padding:10px 14px;}
  .site-header-title h1{font-size:15px;}
  .filter-bar{top:51px;padding:8px 12px;}
  .category-chips{top:97px;padding:7px 12px;}
  .content-area{padding:12px 10px 40px;}
  .rich-content pre{font-size:11px;}
  .formula{font-size:12px;}
  .login-card{padding:28px 22px;}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">📚</div>
    <div class="login-title">Exam Solutions Portal</div>
    <div class="login-subtitle">University Teacher Aspirants · Bangladesh</div>

    <label class="login-label" for="loginUser">Username</label>
    <input id="loginUser" class="login-input" type="text" placeholder="Enter username"
           autocomplete="username" onkeydown="if(event.key==='Enter') document.getElementById('loginPass').focus()">

    <label class="login-label" for="loginPass">Password</label>
    <input id="loginPass" class="login-input" type="password" placeholder="Enter password"
           autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">

    <div id="loginErr" class="login-err"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-divider">Secure login · Session valid for 24 hours</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     APP SCREEN
════════════════════════════════════════════════ -->
<div id="appScreen">

  <!-- Header -->
  <div class="site-header">
    <div class="site-header-title">
      <h1>📚 Exam Solutions Portal</h1>
      <p>Written Exam Guide · EEE &amp; Other Departments</p>
    </div>
    <div class="site-header-right">
      <span class="user-chip" id="userChip">Loading…</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <select id="selUniversity" onchange="applyFilters()">
      <option value="">All Universities</option>
    </select>
    <select id="selDept" onchange="applyFilters()">
      <option value="">All Depts</option>
    </select>
    <select id="selYear" onchange="applyFilters()">
      <option value="">All Years</option>
    </select>
    <select id="selType" onchange="applyFilters()">
      <option value="">All Exam Types</option>
    </select>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Search topics, keywords…" oninput="debounceSearch()">
    </div>
    <button class="btn-clear" onclick="clearFilters()">Clear ✕</button>
    <span class="stats-pill" id="statsPill">Loading…</span>
  </div>

  <!-- Category Quick-Chips -->
  <div class="category-chips" id="categoryChips">
    <!-- populated dynamically -->
  </div>

  <!-- Content -->
  <div class="content-area" id="contentArea">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p>Loading questions…</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightboxOverlay" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Zoomed figure">
  <div id="lightboxCaption"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- ─────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   ⚙  CONFIG — PASTE YOUR GOOGLE APPS SCRIPT DEPLOYMENT URL HERE
   ════════════════════════════════════════════════════════════
   Get it from: Apps Script → Deploy → Manage Deployments → copy URL
   Format: https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec
   ══════════════════════════════════════════════════════════ */
const GAS_URL = 'PASTE_YOUR_GAS_DEPLOYMENT_URL_HERE';

/* ══════════════════════════════════════════
   CATEGORY → ICON / COLOR LOOKUP
   (used to auto-decorate cards when CardColor is left blank in the sheet)
═══════════════════════════════════════════ */
const CATEGORY_META = {
  'programming':              { icon: '💻', color: 'blue'   },
  'digital logic':            { icon: '🔢', color: 'purple' },
  'circuit analysis':         { icon: '⚡', color: 'orange' },
  'power electronics':        { icon: '🔌', color: 'red'    },
  'electronics':               { icon: '🔧', color: 'teal'   },
  'control systems':          { icon: '🎛️', color: 'purple' },
  'communication systems':    { icon: '📡', color: 'teal'   },
  'networking':                { icon: '🌐', color: 'green'  },
  'microprocessor & embedded':{ icon: '🖥️', color: 'orange' },
  'power systems':            { icon: '⚙️', color: 'red'    },
  'database / sql':           { icon: '🗄️', color: 'blue'   },
  'machine learning / ai':    { icon: '🧠', color: 'purple' },
  'mathematics':               { icon: '📐', color: 'green'  },
  'general / viva tips':      { icon: '📌', color: 'orange' },
};
function categoryMeta(cat) {
  const key = String(cat || '').trim().toLowerCase();
  return CATEGORY_META[key] || { icon: '📘', color: 'blue' };
}

/* ══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const S = {
  token    : null,
  user     : null,
  questions: [],
  options  : {},          // { universities[], departments[], years[], examTypes[], categories[] }
  activeCategory: '',
  searchTimer: null,
};

/* ══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', boot);

async function boot() {
  if (GAS_URL.startsWith('PASTE_')) {
    document.getElementById('loginScreen').innerHTML =
      '<div style="padding:40px;color:#fff;text-align:center;font-family:sans-serif">' +
      '<h2 style="color:#f57f17;font-size:20px">⚠️ GAS_URL not configured</h2>' +
      '<p style="margin-top:12px;opacity:.8">Open <code>index.html</code> and replace<br>' +
      '<code>PASTE_YOUR_GAS_DEPLOYMENT_URL_HERE</code><br>with your Apps Script deployment URL.</p>' +
      '<p style="margin-top:12px;opacity:.6;font-size:12px">See SETUP_GUIDE.md for instructions.</p></div>';
    return;
  }

  const saved = localStorage.getItem('eps_session');
  if (saved) {
    try {
      const { token } = JSON.parse(saved);
      const res = await api({ action: 'checkAuth', token });
      if (res.success && res.valid) {
        S.token = token;
        S.user  = res.user;
        showApp();
        await loadAll();
        return;
      }
    } catch(e) { /* fall to login */ }
    localStorage.removeItem('eps_session');
  }
  showLogin();
}

/* ══════════════════════════════════════════
   API HELPER
═══════════════════════════════════════════ */
async function api(params) {
  const qs = Object.entries(params)
    .filter(([,v]) => v !== null && v !== undefined && v !== '')
    .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
    .join('&');
  const res = await fetch(GAS_URL + '?' + qs, { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl    = document.getElementById('loginErr');
  const btn      = document.getElementById('loginBtn');

  errEl.style.display = 'none';
  if (!username || !password) {
    showLoginErr('Please enter your username and password.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>Signing in…';

  try {
    const pwHash = await sha256(password);
    const res    = await api({ action: 'login', username, pwHash });

    if (!res.success) { showLoginErr(res.error || 'Login failed.'); return; }

    S.token = res.token;
    S.user  = res.user;
    localStorage.setItem('eps_session', JSON.stringify({ token: res.token }));
    showApp();
    await loadAll();
  } catch(e) {
    showLoginErr('Connection error. Check your internet or GAS URL. (' + e.message + ')');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}

async function doLogout() {
  try { await api({ action: 'logout', token: S.token }); } catch(e) {}
  S.token = null; S.user = null; S.questions = [];
  localStorage.removeItem('eps_session');
  showLogin();
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}

/* ══════════════════════════════════════════
   SCREEN TRANSITIONS
═══════════════════════════════════════════ */
function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display   = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'block';

  const chip = document.getElementById('userChip');
  const roleLabel = S.user.role === 'admin' ? ' <span class="role-badge">ADMIN</span>' : '';
  chip.innerHTML = '👤 ' + S.user.username + roleLabel;
}

/* ══════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════ */
async function loadAll() {
  setContent('<div class="loading-wrap"><div class="spinner"></div><p>Fetching questions…</p></div>');
  try {
    const [filtersRes, questionsRes] = await Promise.all([
      api({ action: 'getFilters', token: S.token }),
      api({ action: 'getQuestions', token: S.token }),
    ]);

    if (!filtersRes.success)   throw new Error(filtersRes.error);
    if (!questionsRes.success) throw new Error(questionsRes.error);

    S.options   = filtersRes;
    S.questions = questionsRes.questions;

    populateFilters(filtersRes);
    populateCategoryChips(filtersRes.categories);
    renderAll(S.questions);
  } catch(e) {
    setContent('<div class="no-results"><div style="font-size:32px">⚠️</div><p>Failed to load: ' + e.message + '</p></div>');
  }
}

async function fetchQuestions() {
  const params = {
    action     : 'getQuestions',
    token      : S.token,
    university : document.getElementById('selUniversity').value,
    department : document.getElementById('selDept').value,
    year       : document.getElementById('selYear').value,
    examtype   : document.getElementById('selType').value,
    category   : S.activeCategory,
    search     : document.getElementById('searchInput').value.trim(),
  };
  try {
    const res = await api(params);
    if (!res.success) throw new Error(res.error);
    S.questions = res.questions;
    renderAll(S.questions);
  } catch(e) {
    showToast('Error: ' + e.message);
  }
}

/* ══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
function populateFilters(opts) {
  fill('selUniversity', opts.universities, 'All Universities');
  fill('selDept',       opts.departments,  'All Depts');
  fill('selYear',       opts.years,        'All Years');
  fill('selType',       opts.examTypes,    'All Exam Types');
}

function fill(id, items, placeholder) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">' + placeholder + '</option>';
  (items || []).forEach(function(v) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (v === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

function populateCategoryChips(categories) {
  const wrap = document.getElementById('categoryChips');
  if (!categories || !categories.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';

  let html = '<button class="cat-chip' + (S.activeCategory === '' ? ' active' : '') +
             '" onclick="setCategory(\'\')">🗂️ All Topics</button>';
  categories.forEach(function(cat) {
    const meta = categoryMeta(cat);
    const isActive = S.activeCategory === cat;
    html += '<button class="cat-chip' + (isActive ? ' active' : '') + '" onclick="setCategory(\'' +
            escAttr(cat) + '\')">' + meta.icon + ' ' + escHtml(cat) + '</button>';
  });
  wrap.innerHTML = html;
}

function setCategory(cat) {
  S.activeCategory = cat;
  populateCategoryChips(S.options.categories);
  fetchQuestions();
}

function applyFilters() { fetchQuestions(); }

function clearFilters() {
  ['selUniversity','selDept','selYear','selType'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('searchInput').value = '';
  S.activeCategory = '';
  populateCategoryChips(S.options.categories);
  fetchQuestions();
}

function debounceSearch() {
  clearTimeout(S.searchTimer);
  S.searchTimer = setTimeout(fetchQuestions, 400);
}

/* ══════════════════════════════════════════
   RENDERING
═══════════════════════════════════════════ */
function renderAll(questions) {
  const area = document.getElementById('contentArea');

  if (!questions || questions.length === 0) {
    setContent('<div class="no-results"><div style="font-size:40px">🔍</div><p>No questions match your filters.<br><small style="opacity:.6">Try clearing filters or a different search term.</small></p></div>');
    document.getElementById('statsPill').textContent = '0 results';
    return;
  }

  // Group: university > dept+year+examType
  const groups = new Map();
  questions.forEach(function(q) {
    const groupKey = q.university + ' | ' + q.department + ' | ' + q.year + ' | ' + q.examType;
    if (!groups.has(groupKey)) {
      groups.set(groupKey, { university: q.university, dept: q.department,
                              year: q.year, examType: q.examType, items: [] });
    }
    groups.get(groupKey).items.push(q);
  });

  // Tip sections to bottom
  const sorted = [...groups.values()].sort(function(a, b) {
    if (a.examType === 'Tips' && b.examType !== 'Tips') return 1;
    if (b.examType === 'Tips' && a.examType !== 'Tips') return -1;
    return b.year - a.year;
  });

  let html = '';
  sorted.forEach(function(g, gi) {
    const isTips = g.examType === 'Tips';
    const sectionId = 'sec_' + gi;
    const yearLabel = g.year && g.year !== 'General' ? g.year : '';
    const examLabel = g.examType || '';
    const metaStr   = [g.dept, yearLabel, examLabel].filter(Boolean).join(' · ');
    const pillHtml  = [
      g.dept     ? '<span class="section-pill">' + escHtml(g.dept) + '</span>' : '',
      yearLabel  ? '<span class="section-pill">' + escHtml(yearLabel) + '</span>' : '',
      examLabel  ? '<span class="section-pill' + (isTips ? ' section-pill-accent' : '') + '">' + escHtml(examLabel) + '</span>' : '',
      '<span class="section-pill">' + g.items.length + (g.items.length === 1 ? ' Q' : ' Qs') + '</span>',
    ].join('');

    html += '<div class="section-header" onclick="toggleSection(\'' + sectionId + '\', this)">';
    html += '<div class="section-info">';
    html += '<span class="section-uni">' + (isTips ? '📌 ' : '') + escHtml(g.university) + '</span>';
    if (metaStr) html += '<span class="section-meta">' + escHtml(metaStr) + '</span>';
    html += '<div class="section-pills">' + pillHtml + '</div>';
    html += '</div>';
    html += '<span class="s-arrow">▲</span>';
    html += '</div>';
    html += '<div class="section-body" id="' + sectionId + '">';

    g.items.forEach(function(q) {
      html += buildCard(q);
    });

    html += '</div>'; // section-body
  });

  area.innerHTML = html;

  // Highlight code blocks
  area.querySelectorAll('pre code').forEach(function(el) {
    hljs.highlightElement(el);
  });

  // Render MathJax
  if (window.MathJax && window.MathJax.typeset) {
    window.MathJax.typeset([area]);
  }

  // Update stats
  const total = questions.length;
  const groups_count = sorted.length;
  document.getElementById('statsPill').textContent =
    total + ' question' + (total !== 1 ? 's' : '') + ' · ' + groups_count + ' section' + (groups_count !== 1 ? 's' : '');
}

/* ── Build a single Q card ── */
function buildCard(q) {
  const meta        = categoryMeta(q.category);
  const colorClass  = 'card-head-' + (q.cardColor || meta.color);
  const bodyOpen    = q.defaultOpen ? ' open' : '';
  const arrowSymbol = q.defaultOpen ? '▲' : '▼';
  const questionHtml = q.questionText
    ? '<div class="polished-q"><div class="polished-q-label">✏️ Question</div><div class="rich-content">' +
      formatContent(q.questionText) + '</div></div>'
    : '';
  const answerHtml = formatContent(q.answer || '');
  const catLabel = q.category ? (meta.icon + ' ' + escHtml(q.category)) : '';

  return [
    '<div class="card">',
    '  <div class="card-head ' + colorClass + '" onclick="toggleCard(this)">',
    '    <div class="card-head-left">',
    '      <span class="qnum">' + escHtml(q.questionNumber || 'Q') + '</span>',
    '      <div class="card-title-wrap">',
    '        <div class="card-title">' + escHtml(q.topic || 'Untitled') + '</div>',
    catLabel ? '        <div class="card-cat">' + catLabel + '</div>' : '',
    '      </div>',
    '    </div>',
    '    <span class="c-arrow">' + arrowSymbol + '</span>',
    '  </div>',
    '  <div class="card-body' + bodyOpen + '">',
    '    ' + questionHtml,
    '    <div class="rich-content">' + answerHtml + '</div>',
    '  </div>',
    '</div>',
  ].join('\n');
}

function setContent(html) {
  document.getElementById('contentArea').innerHTML = html;
}

/* ══════════════════════════════════════════
   ANSWER FORMATTER  —  plain text → rich HTML
   ════════════════════════════════════════════
   Supports a lightweight, WhatsApp-style plain-text syntax so
   answers AND questions can be typed directly into the sheet with zero HTML:
     # Heading            *bold*        _italic_      ~strike~
     - bullet item         1. numbered item            `inline code`
     ```lang ... ```       code block (language optional, auto-detected)
     Col | Col | Col       table row (first row = header)
     = Formula text        styled formula box
     TIP: / NOTE: /
     WARNING: / IMPORTANT: styled callout box (single-line or block)
     https://...            bare link on its own line → embedded figure
                            (auto-converts Google Drive share links, with
                            automatic fallback + a friendly error message
                            if the image still can't be loaded)
                            or a clickable resource link if not an image
   If a row's text already contains real HTML tags, it is treated
   as "advanced mode" and passed through unchanged (escape hatch for
   power users who want pixel-level control). Used for BOTH the
   QuestionText and Answer columns.
═══════════════════════════════════════════ */

function formatContent(raw) {
  if (!raw) return '';

  // Advanced/legacy escape hatch: real HTML tags present → render as-is.
  if (/<\/?(h[1-6]|table|div|ul|ol|li|p|pre|figure)\b/i.test(raw)) {
    return raw;
  }

  let text = raw.replace(/\r\n/g, '\n');

  // 1) Extract fenced code blocks first so nothing inside is touched by other rules
  const codeBlocks = [];
  text = text.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, function(_, lang, code) {
    codeBlocks.push({ lang: lang || '', code: code.replace(/\n$/, '') });
    return '\n\u0000CB' + (codeBlocks.length - 1) + '\u0001\n';
  });

  const lines = text.split('\n');
  const out = [];

  let mode = null;       // null | 'p' | 'ul' | 'ol' | 'table' | 'box'
  let buf = [];
  let boxType = null;
  let tableRows = [];

  const BOX_CLASS = { TIP: 'box-green', NOTE: 'box-blue', WARNING: 'box-orange', IMPORTANT: 'box-red' };

  function flush() {
    if (mode === 'p' && buf.length) {
      out.push('<p>' + buf.map(inlineFormat).join('<br>') + '</p>');
    } else if (mode === 'ul' && buf.length) {
      out.push('<ul>' + buf.map(function(l) { return '<li>' + inlineFormat(l) + '</li>'; }).join('') + '</ul>');
    } else if (mode === 'ol' && buf.length) {
      out.push('<ol>' + buf.map(function(l) { return '<li>' + inlineFormat(l) + '</li>'; }).join('') + '</ol>');
    } else if (mode === 'box' && buf.length) {
      out.push('<div class="box ' + BOX_CLASS[boxType] + '">' + buf.map(inlineFormat).join('<br>') + '</div>');
    } else if (mode === 'table' && tableRows.length) {
      out.push(renderTable(tableRows));
    }
    buf = []; tableRows = []; mode = null; boxType = null;
  }

  function renderTable(rows) {
    const dataRows = rows.filter(function(r) { return !/^[\s\-:|]+$/.test(r); });
    if (!dataRows.length) return '';
    const cells = dataRows.map(function(r) {
      let arr = r.split('|').map(function(c) { return c.trim(); });
      if (arr.length && arr[0] === '') arr.shift();
      if (arr.length && arr[arr.length - 1] === '') arr.pop();
      return arr;
    });
    let html = '<div class="table-wrap"><table>';
    cells.forEach(function(row, ri) {
      const tag = ri === 0 ? 'th' : 'td';
      html += '<tr>' + row.map(function(c) { return '<' + tag + '>' + inlineFormat(c) + '</' + tag + '>'; }).join('') + '</tr>';
    });
    html += '</table></div>';
    return html;
  }

  function isTableLine(l) {
    if (!l.includes('|')) return false;
    const parts = l.split('|').map(function(s) { return s.trim(); }).filter(Boolean);
    return parts.length >= 2;
  }

  for (let idx = 0; idx < lines.length; idx++) {
    const line = lines[idx].trim();

    if (line === '') { flush(); continue; }

    const cbMatch = line.match(/^\u0000CB(\d+)\u0001$/);
    if (cbMatch) {
      flush();
      const blk = codeBlocks[Number(cbMatch[1])];
      out.push('<pre><code class="' + (blk.lang ? 'language-' + blk.lang : '') + '">' + escHtml(blk.code) + '</code></pre>');
      continue;
    }

    let m = line.match(/^#\s+(.+)$/);
    if (m) { flush(); out.push('<h3>' + inlineFormat(m[1]) + '</h3>'); continue; }

    m = line.match(/^=\s+(.+)$/);
    if (m) { flush(); out.push('<div class="formula">' + inlineFormat(m[1]) + '</div>'); continue; }

    m = line.match(/^(TIP|NOTE|WARNING|IMPORTANT):\s*(.*)$/i);
    if (m) {
      flush();
      boxType = m[1].toUpperCase(); mode = 'box'; buf = [];
      if (m[2]) buf.push(m[2]);
      continue;
    }
    if (mode === 'box') { buf.push(line); continue; }

    m = line.match(/^(https?:\/\/\S+)(?:\s*-\s*(.+))?$/);
    if (m) {
      flush();
      const rawUrl  = m[1];
      const caption = m[2] || '';
      if (isImageUrl(rawUrl)) {
        out.push(buildFigureHtml(rawUrl, caption));
      } else {
        out.push('<a class="resource-link" href="' + rawUrl + '" target="_blank" rel="noopener">🔗 ' +
          escHtml(caption || rawUrl) + '</a>');
      }
      continue;
    }

    m = line.match(/^[-•]\s+(.+)$/);
    if (m) { if (mode !== 'ul') { flush(); mode = 'ul'; } buf.push(m[1]); continue; }

    m = line.match(/^\d+[\.\)]\s+(.+)$/);
    if (m) { if (mode !== 'ol') { flush(); mode = 'ol'; } buf.push(m[1]); continue; }

    if (isTableLine(line)) { if (mode !== 'table') { flush(); mode = 'table'; } tableRows.push(line); continue; }

    if (mode !== 'p') { flush(); mode = 'p'; }
    buf.push(line);
  }
  flush();

  return out.join('\n');
}

/* ── Inline emphasis: bold *x*, italic _x_, strike ~x~, `code`, auto-link bare URLs ── */
function inlineFormat(text) {
  let h = escHtml(text);

  const codeStash = [];
  h = h.replace(/`([^`\n]+)`/g, function(_, c) {
    codeStash.push(c);
    return '\u0000IC' + (codeStash.length - 1) + '\u0001';
  });

  const urlStash = [];
  h = h.replace(/https?:\/\/[^\s<]+/g, function(u) {
    urlStash.push(u);
    return '\u0000URL' + (urlStash.length - 1) + '\u0001';
  });

  h = h.replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');
  h = h.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  h = h.replace(/~([^~\n]+)~/g, '<s>$1</s>');

  h = h.replace(/\u0000URL(\d+)\u0001/g, function(_, i) {
    const u = urlStash[Number(i)];
    return '<a href="' + u + '" target="_blank" rel="noopener">' + escHtml(u) + '</a>';
  });
  h = h.replace(/\u0000IC(\d+)\u0001/g, function(_, i) {
    return '<code>' + codeStash[Number(i)] + '</code>';
  });

  return h;
}

/* ══════════════════════════════════════════
   IMAGE EMBEDDING — Google Drive reliability fix
   ════════════════════════════════════════════
   Google's old `uc?export=view&id=` hotlink format frequently fails for
   <img> tags — Drive often serves an HTML interstitial page instead of
   the actual image bytes when the file is hotlinked from an external
   site. We use the `thumbnail` endpoint instead (the same one Drive's
   own UI uses for previews — much more reliable for direct embedding),
   with a second CDN format as an automatic fallback, and a friendly
   on-page message (instead of a broken image icon) if both fail.
═══════════════════════════════════════════ */

/** Extracts a Drive file ID from any common share-link format. */
function driveify(url) {
  let id = null;
  let m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m) id = m[1];
  if (!id) { m = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/); if (m) id = m[1]; }
  if (!id) { m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/); if (m) id = m[1]; }

  if (!id) {
    // Not a recognizable Drive link — leave it alone (Imgur, GitHub, direct .png/.jpg, etc.)
    return { primary: url, fallback: null, original: url };
  }
  return {
    primary : 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1600',
    fallback: 'https://lh3.googleusercontent.com/d/' + id,
    original: 'https://drive.google.com/file/d/' + id + '/view',
  };
}

function isImageUrl(url) {
  const u = url.toLowerCase();
  return /\.(png|jpe?g|gif|webp|svg)(\?.*)?$/.test(u)
      || u.includes('drive.google.com')
      || u.includes('imgur.com')
      || u.includes('githubusercontent.com');
}

/** Builds the <figure> HTML with fallback + error-handling data attributes. */
function buildFigureHtml(rawUrl, caption) {
  const d = driveify(rawUrl);
  const capHtml = caption ? '<figcaption class="img-caption">' + escHtml(caption) + '</figcaption>' : '';
  return '<figure class="img-figure">' +
    '<img src="' + d.primary + '"' +
    ' data-fallback="' + escHtml(d.fallback || '') + '"' +
    ' data-original="' + escHtml(d.original) + '"' +
    ' data-caption="' + escHtml(caption) + '"' +
    ' alt="' + escHtml(caption || 'Figure') + '"' +
    ' loading="lazy" class="zoomable"' +
    ' onerror="handleImgError(this)"' +
    ' onclick="openLightbox(this.src, this.dataset.caption)">' +
    capHtml + '</figure>';
}

/**
 * Called automatically when an embedded image fails to load.
 * Tries one fallback CDN format; if that also fails, replaces the image
 * with a clear, actionable message instead of leaving a broken icon.
 */
function handleImgError(img) {
  if (!img.dataset.triedFallback && img.dataset.fallback) {
    img.dataset.triedFallback = '1';
    img.src = img.dataset.fallback;
    return;
  }
  const original = img.dataset.original || '#';
  const caption  = img.dataset.caption || '';
  const box = document.createElement('div');
  box.className = 'img-error';
  box.innerHTML =
    '⚠️ This image could not be loaded.<br>' +
    'Make sure the file is shared as <strong>"Anyone with the link"</strong>.<br>' +
    '<a href="' + original + '" target="_blank" rel="noopener">Open the original link →</a>' +
    (caption ? '<div class="img-caption">' + escHtml(caption) + '</div>' : '');
  const fig = img.closest('figure');
  if (fig && fig.parentNode) fig.replaceWith(box);
  else if (img.parentNode) img.replaceWith(box);
}

/* ══════════════════════════════════════════
   UI INTERACTIONS
═══════════════════════════════════════════ */
function toggleCard(head) {
  const body  = head.nextElementSibling;
  const arrow = head.querySelector('.c-arrow');
  const open  = body.classList.toggle('open');
  arrow.textContent = open ? '▲' : '▼';

  if (open) {
    body.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));
    if (window.MathJax && window.MathJax.typeset) window.MathJax.typeset([body]);
  }
}

function toggleSection(id, headerEl) {
  const body  = document.getElementById(id);
  const arrow = headerEl.querySelector('.s-arrow');
  const collapsed = body.classList.toggle('collapsed');
  arrow.style.transform = collapsed ? 'rotate(180deg)' : '';
}

function openLightbox(src, caption) {
  document.getElementById('lightboxImg').src        = src;
  document.getElementById('lightboxCaption').textContent = caption || '';
  document.getElementById('lightboxOverlay').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightboxOverlay').classList.remove('active');
  document.getElementById('lightboxImg').src = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

function showToast(msg, ms) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, ms || 3000);
}

/* ══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function escHtml(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s==null?'':s).replace(/'/g, "\\'");
}
</script>
